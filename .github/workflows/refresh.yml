name: Refresh incident data

on:
  schedule:
    # Daily at 06:00 UTC (matches ACLED's typical Monday/Thursday release cadence + buffer)
    - cron: '0 6 * * *'
  workflow_dispatch:  # allow manual trigger from the Actions tab

permissions:
  contents: write   # required so the bot can commit the new incidents.json

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run refresh script
        env:
          ACLED_EMAIL:    ${{ secrets.ACLED_EMAIL }}
          ACLED_PASSWORD: ${{ secrets.ACLED_PASSWORD }}
        run: python refresh.py

      - name: Commit and push if changed
        run: |
          git config user.name  "palshield-bot"
          git config user.email "bot@palshield.org"
          git add incidents.json
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit."
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%d)"
            
            # Retry logic for push to handle concurrent runs
            for attempt in {1..3}; do
              git pull --rebase origin main && git push origin main && break
              if [ $attempt -lt 3 ]; then
                echo "Push failed, retrying in 5 seconds..."
                sleep 5
              else
                echo "Push failed after 3 attempts"
                exit 1
              fi
            done
          fi
